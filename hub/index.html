<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Prevent FOUC: apply stored colour scheme before React hydration -->
    <script>
      try {
        var _s = window.localStorage.getItem("jy-scheme");
        var mode = _s === "light" || _s === "dark" || _s === "system" ? _s : "system";
        var dark =
          mode === "dark" ||
          (mode === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-scheme", dark ? "dark" : "light");
      } catch (e) {}
    </script>

    <!-- Primary meta -->
    <title>junkyard.sh - free tools, salvaged from behind paywalls</title>
    <meta
      name="description"
      content="42 free tools that run entirely in your browser. No accounts, no uploads, no paywalls. Salvaged from behind subscriptions and left out for anyone to grab."
    />
    <meta
      name="keywords"
      content="free tools, browser tools, no paywall, image converter, qr code, json formatter, pdf toolkit, background remover, no upload, privacy tools"
    />
    <meta name="author" content="Andryo Marzuki" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://junkyard.mrzk.io/" />
    <link rel="author" href="https://mrzk.io" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Theme colour (light + dark) -->
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#13171a" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->

    <meta

    <meta

    <!-- TODO: generate og.png banner (1200x630) for this hub -->

        ]

    </script>

    <!-- Umami analytics: deferred - no site-id assigned yet for the hub -->
