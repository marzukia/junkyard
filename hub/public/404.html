<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>page not found — junkyard</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #fafafa;
        --fg: #0d0d0d;
        --muted: #6b7280;
        --accent: #2f9d8d;
        --border: #e5e7eb;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #13171a;
          --fg: #f0f0f0;
          --muted: #9ca3af;
          --border: #23282d;
        }
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: "JetBrains Mono", "Fira Mono", "Consolas", monospace;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }

      .card {
        text-align: center;
        max-width: 480px;
        width: 100%;
      }

      .wordmark {
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--fg);
        line-height: 1;
        margin-bottom: 0.25rem;
      }

      .wordmark .tld {
        color: var(--accent);
      }

      .code {
        font-size: 5rem;
        font-weight: 800;
        color: var(--accent);
        line-height: 1;
        margin: 1.5rem 0 0.5rem;
        letter-spacing: -0.05em;
      }

      .headline {
        font-size: 1rem;
        color: var(--muted);
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1.5rem 0;
      }

      .cta {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.9rem;
        padding: 0.75rem 2rem;
        letter-spacing: 0.01em;
        transition: opacity 0.15s;
      }

      .cta:hover {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="wordmark">junkyard<span class="tld">.sh</span></div>
      <div class="code">404</div>
      <p class="headline">
        page not found<br />
        the tool you are looking for may have moved
      </p>
      <hr class="divider" />
      <a href="https://junkyard.sh/" class="cta">back to all tools</a>
    </div>
  </body>
</html>
