name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "hub/**"
      - "apps/**"
      - "scripts/**"
      - "packages/**"
      - "kit/**"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check catalogue is up to date
        # Fails if any apps/*/junkyard.ts was edited without regenerating the
        # catalogue artifacts. The generator also validates description quality
        # and mcp.tools shape. Runs from repo root; bun needs no deps.
        run: |
          bun scripts/gen-catalogue.ts
          git diff --exit-code hub/src/catalogue.generated.ts hub/public/catalogue.json

      - name: Check vendored AppSwitcher copies are up to date
        # Fails if kit/AppSwitcher.* was changed without running vendor-switcher.mjs
        run: |
          bun scripts/vendor-switcher.mjs
          git diff --exit-code

      - name: Check vendored ThemeToggle copies are up to date
        # Fails if kit/ThemeToggle.tsx was changed without running vendor-themetoggle.mjs
        run: |
          node scripts/vendor-themetoggle.mjs
          git diff --exit-code

      - name: Check vendored format copies are up to date
        # Fails if kit/components/format.ts was changed without running vendor-format.mjs.
        # Editing the canonical source without re-vendoring leaves the 6 target apps
        # (bg, caption, cleanup, depth, transcribe, upscale) diverged from kit.
        run: |
          node scripts/vendor-format.mjs
          git diff --exit-code

      - name: Check vendored transformersEnv copies are up to date
        # Fails if kit/components/transformersEnv.ts was changed without running
        # vendor-transformers-env.mjs. Editing the canonical source without re-vendoring
        # leaves the 5 target AI apps (bg, caption, depth, translate, upscale) diverged from kit.
        run: |
          node scripts/vendor-transformers-env.mjs
          git diff --exit-code -- kit/components/transformersEnv.ts apps/bg/src/lib/transformersEnv.ts apps/caption/src/lib/transformersEnv.ts apps/depth/src/lib/transformersEnv.ts apps/translate/src/lib/transformersEnv.ts apps/upscale/src/lib/transformersEnv.ts

      - name: SEO domain guard - no stale per-app mrzk.io subdomains
        # Fails if any shipped HTML/sitemap/robots still contains a non-junkyard
        # *.mrzk.io subdomain (e.g. password.mrzk.io from old per-app deploys).
        # Covers app-root index.html as well as public/ sitemap + robots.
        # Also asserts hub/public/CNAME is exactly "junkyard.mrzk.io" - the
        # GH Pages origin. Any other value means it was accidentally changed.
        run: |
          if grep -rE '[a-z0-9-]+\.mrzk\.io' \
               --include='index.html' \
               --include='sitemap.xml' \
               --include='robots.txt' \
               apps/ \
             | grep -v 'junkyard\.mrzk\.io'; then
            echo "ERROR: stale non-junkyard mrzk.io subdomain(s) found in apps/ (index.html / sitemap.xml / robots.txt)"
            exit 1
          fi
          cname="$(cat hub/public/CNAME)"
          if [ "$cname" != "junkyard.mrzk.io" ]; then
            echo "ERROR: hub/public/CNAME must be exactly 'junkyard.mrzk.io' but got: '$cname'"
            exit 1
          fi
          echo "SEO domain guard: OK (CNAME=$cname)"

      - name: Sitemap and robots existence guard
        # Fails if any apps/<slug>/public/sitemap.xml or robots.txt is missing,
        # or if hub/public/sitemap.xml is missing.
        run: bun scripts/check-sitemap-exists.mjs

      - name: Umami analytics id guard
        # Fails if any app slug (except the known-excluded video and cleanup)
        # is absent from umami-ids.txt or has an invalid UUID.
        run: bun scripts/check-umami-present.mjs

      - name: Hub sitemap vs catalogue drift guard
        # Fails if hub/public/sitemap.xml and hub/public/catalogue.json diverge:
        # every catalogue slug must appear in the sitemap and vice-versa.
        run: bun scripts/check-hub-sitemap-from-catalogue.mjs

      - name: Core TOOLS vs exposed apps guard
        # Fails if the set of apps with mcp.exposed:true diverges from the
        # slugs registered in @junkyard/core TOOLS (must stay at 17).
        # Installs core deps first so the import succeeds in CI.
        run: |
          cd packages/core && bun install --frozen-lockfile && cd ../..
          bun ./scripts/check-core-vs-exposed.mjs

      - name: Typecheck and test packages/core
        # Ensures @junkyard/core stays type-clean and its 195 unit tests pass.
        # Deps are already installed by the core-vs-exposed step above.
        run: |
          cd packages/core
          bunx tsc --noEmit
          bun run test

      - name: Typecheck and test packages/mcp-server
        # Ensures @junkyard/mcp-server is importable and its helper tests pass.
        # Uses `bun test` (Bun-native TS project; no separate tsconfig needed).
        run: |
          cd packages/mcp-server
          bun install --frozen-lockfile
          bun test

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build consolidated site
        run: bash scripts/build-site.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
