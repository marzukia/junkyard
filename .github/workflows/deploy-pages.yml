name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "hub/**"
      - "apps/**"
      - "scripts/**"
      - "packages/**"
      - "kit/**"
      - ".github/workflows/deploy-pages.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "hub/**"
      - "apps/**"
      - "scripts/**"
      - "packages/**"
      - "kit/**"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Build package ──────────────────────────────────────────────────
      - name: Build @junkyardsh/ui package
        run: cd packages/ui && bun install --frozen-lockfile 2>/dev/null && bun run build

      # ── Lint ────────────────────────────────────────────────────────────
      # Biome CI on hub, kit, and all 47 apps. Runs in parallel per app.
      - name: Lint hub
        run: cd hub && bun install --frozen-lockfile 2>/dev/null && bun run ci
      - name: Lint kit
        run: cd kit && bun install --frozen-lockfile 2>/dev/null && bun run ci
      - name: Lint all apps
        run: |
          export ONNXRUNTIME_NODE_INSTALL_CUDA=skip
          for app_dir in apps/*/; do
            bun run --cwd "$app_dir" ci &
          done
          wait

      # ── Typecheck ──────────────────────────────────────────────────────
      - name: Typecheck hub
        run: cd hub && bun install --frozen-lockfile 2>/dev/null && bunx tsc --noEmit

      # ── Test ────────────────────────────────────────────────────────────
      - name: Test kit
        run: cd kit && bun install --frozen-lockfile 2>/dev/null && bun test
      - name: Test AI apps
        run: |
          export ONNXRUNTIME_NODE_INSTALL_CUDA=skip
          for app in bg caption depth summarize transcribe translate upscale; do
            cd "apps/$app" && bun install --frozen-lockfile 2>/dev/null && bun test &
          done
          wait

      - name: Check catalogue is up to date
        # Fails if any apps/*/junkyard.ts was edited without regenerating the
        # catalogue artifacts. The generator also validates description quality
        # and mcp.tools shape. Runs from repo root; bun needs no deps.
        run: |
          bun scripts/gen-catalogue.ts
          git diff --exit-code hub/src/catalogue.generated.ts hub/public/catalogue.json


      - name: SEO domain guard - no stale per-app mrzk.io subdomains
        # Fails if any shipped HTML/sitemap/robots still contains a non-junkyard
        # *.mrzk.io subdomain (e.g. password.mrzk.io from old per-app deploys).
        # Covers app-root index.html as well as public/ sitemap + robots.
        # Also asserts hub/public/CNAME is exactly "junkyard.mrzk.io" - the
        # GH Pages origin. Any other value means it was accidentally changed.
        run: |
          if grep -rE '[a-z0-9-]+\.mrzk\.io' \
               --include='index.html' \
               --include='sitemap.xml' \
               --include='robots.txt' \
               apps/ \
             | grep -v 'junkyard\.mrzk\.io'; then
            echo "ERROR: stale non-junkyard mrzk.io subdomain(s) found in apps/ (index.html / sitemap.xml / robots.txt)"
            exit 1
          fi
          cname="$(cat hub/public/CNAME)"
          if [ "$cname" != "junkyard.mrzk.io" ]; then
            echo "ERROR: hub/public/CNAME must be exactly 'junkyard.mrzk.io' but got: '$cname'"
            exit 1
          fi
          echo "SEO domain guard: OK (CNAME=$cname)"

      - name: Check theme-bootstrap inline scripts are up to date
        # Fails if any apps/*/index.html bootstrap <script> (the no-flash
        # dark-mode block) diverges from the canonical in kit/seo/index-template.html.
        # Edit the canonical template first, then reconcile all apps with the
        # same Python one-liner used in the original reconciliation commit.
        run: bun scripts/check-bootstrap.mjs

      - name: Sitemap and robots existence guard
        # Fails if any apps/<slug>/public/sitemap.xml or robots.txt is missing,
        # or if hub/public/sitemap.xml is missing.
        run: bun scripts/check-sitemap-exists.mjs

      - name: Umami analytics id guard
        # Fails if ANY app slug is absent from umami-ids.txt or has an invalid UUID.
        # (All 44 slugs required; the former video/cleanup exclusion was removed in the script.)
        run: bun scripts/check-umami-present.mjs

      - name: Hub sitemap vs catalogue drift guard
        # Fails if hub/public/sitemap.xml and hub/public/catalogue.json diverge:
        # every catalogue slug must appear in the sitemap and vice-versa.
        run: bun scripts/check-hub-sitemap-from-catalogue.mjs

      - name: Doc tool-count guard
        # Fails if the tool count stated in README.md, CONTRIBUTING.md, or
        # docs/ARCHITECTURE.md diverges from the real apps/ directory count.
        # Prevents silent "44" drift when a new tool is added without updating docs.
        run: bun scripts/check-doc-counts.mjs

      - name: Core TOOLS vs exposed apps guard
        # Fails if the set of apps with mcp.exposed:true diverges from the
        # slugs registered in @junkyard/core TOOLS (must stay at 17).
        # Installs core deps first so the import succeeds in CI.
        run: |
          cd packages/core && bun install --frozen-lockfile && cd ../..
          bun ./scripts/check-core-vs-exposed.mjs

      - name: Typecheck and test packages/core
        # Ensures @junkyard/core stays type-clean and all unit tests pass.
        # Deps are already installed by the core-vs-exposed step above.
        run: |
          cd packages/core
          bunx tsc --noEmit
          bun run test

      - name: Typecheck and test packages/mcp-server
        # Ensures @junkyard/mcp-server is importable and its helper tests pass.
        # Uses `bun test` (Bun-native TS project; no separate tsconfig needed).
        run: |
          cd packages/mcp-server
          bun install --frozen-lockfile
          bun test

  build:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build consolidated site
        run: bash scripts/build-site.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
