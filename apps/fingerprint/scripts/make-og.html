<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width:1200px; height:630px; overflow:hidden; background:#fafafa;
    font-family:'Roboto',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  .canvas { width:1200px; height:630px; background:#fafafa; display:flex;
    flex-direction:column; padding:72px 80px; position:relative; }
  .kicker { font-family:'Roboto Mono',monospace; font-size:14px; font-weight:500;
    letter-spacing:0.12em; text-transform:uppercase; color:#2f9d8d; margin-bottom:16px; }
  .title { font-size:128px; font-weight:700; letter-spacing:-0.045em; line-height:0.9;
    color:#1a2530; margin-bottom:14px; display:flex; align-items:center; gap:24px; }
  .title-mark { width:96px; height:96px; flex-shrink:0; }
  .subtitle { font-size:26px; font-weight:400; color:#5b6671; margin-bottom:46px; letter-spacing:-0.01em; }
  .visuals { display:flex; flex-direction:column; gap:20px; flex:1; justify-content:center; }
  .riskwrap { display:flex; flex-direction:column; gap:10px; }
  .riskbar { height:26px; border-radius:13px;
    background:linear-gradient(90deg,#2f9d8d 0%,#e8b04b 52%,#d9594c 100%);
    box-shadow:0 2px 10px rgba(26,37,48,0.08); }
  .riskscale { display:flex; justify-content:space-between; font-family:'Roboto Mono',monospace;
    font-size:13px; font-weight:500; letter-spacing:0.04em; text-transform:uppercase; color:#9aa3ac; }
  .riskscale b { color:#2f9d8d; } .riskscale .mid { color:#c9912f; } .riskscale .hi { color:#d9594c; }
  .chips { display:flex; gap:12px; flex-wrap:wrap; }
  .chip { font-family:'Roboto Mono',monospace; font-size:15px; font-weight:500; letter-spacing:0.03em;
    color:#1a2530; border:1.5px solid #d8dde2; border-radius:999px; padding:9px 18px; background:#fff; }
  .domain { position:absolute; bottom:64px; right:80px; font-family:'Roboto Mono',monospace;
    font-size:14px; font-weight:500; letter-spacing:0.06em; color:#9aa3ac; }
</style></head>
<body><div class="canvas">
  <div class="kicker">Browser Fingerprint · Bot Detection</div>
  <div class="title">
    <svg class="title-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" stroke-width="1.8">
      <ellipse cx="16" cy="14.5" rx="10.6" ry="12.6" stroke="#2f9d8d"/>
      <ellipse cx="16.4" cy="15.1" rx="8" ry="9.8" stroke="#2f9d8d"/>
      <ellipse cx="16.8" cy="15.7" rx="5.6" ry="7.2" stroke="#e8b04b"/>
      <ellipse cx="17.1" cy="16.3" rx="3.3" ry="4.6" stroke="#e8b04b"/>
      <ellipse cx="17.4" cy="16.9" rx="1.5" ry="2.3" stroke="#d9594c"/>
    </svg>
    Fingerprint
  </div>
  <div class="subtitle">what the anti-bot stack reads off your browser</div>
  <div class="visuals">
    <div class="riskwrap">
      <div class="riskbar"></div>
      <div class="riskscale"><b>Likely human</b><span class="mid">Suspicious</span><span class="hi">Likely bot</span></div>
    </div>
    <div class="chips">
      <span class="chip">canvas</span><span class="chip">webgl</span><span class="chip">webgpu</span>
      <span class="chip">audio</span><span class="chip">fonts</span><span class="chip">automation tells</span>
    </div>
  </div>
  <div class="domain">junkyard.sh/fingerprint</div>
</div></body></html>
