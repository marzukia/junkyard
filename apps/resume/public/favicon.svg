<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Resume glyph: document with person silhouette and text lines -->
  <!-- Document outline - teal stroke -->
  <path d="M6 3 L22 3 L26 7 L26 29 L6 29 Z"
    stroke="#2f9d8d" stroke-width="2" stroke-linejoin="round" fill="none"/>
  <!-- Fold crease - teal -->
  <path d="M22 3 L22 7 L26 7"
    stroke="#2f9d8d" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
  <!-- Person head circle - amber -->
  <circle cx="13" cy="11" r="2.5" stroke="#e8b04b" stroke-width="1.5" fill="none"/>
  <!-- Person shoulders arc - amber -->
  <path d="M8.5 17.5 C8.5 14.5 17.5 14.5 17.5 17.5"
    stroke="#e8b04b" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Text lines - coral -->
  <line x1="20" y1="11" x2="23.5" y2="11" stroke="#d9594c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="14" x2="23.5" y2="14" stroke="#d9594c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Body text lines - teal faint -->
  <line x1="9" y1="21" x2="23" y2="21" stroke="#2f9d8d" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="9" y1="24" x2="20" y2="24" stroke="#2f9d8d" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
</svg>
