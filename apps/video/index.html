          {

            ]

            "@type": "WebApplication",

            "description": "Free in-browser video toolkit: trim, convert (mp4/webm/gif), compress, and turn video into GIF. Powered by ffmpeg.wasm - no upload, no signup, no watermark.",

          }

    </script>

    <!-- No-flash dark-mode script -->
    <script>
      try {
        var _cs = window.localStorage.getItem("mantine-color-scheme-value");
        var cs = _cs === "light" || _cs === "dark" || _cs === "auto" ? _cs : "auto";
        var computed =
          cs !== "auto"
            ? cs
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-mantine-color-scheme", computed);
      } catch (e) {}
    </script>
