<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- OCR glyph: scan-frame mark — teal corner brackets + amber scan line + coral text hints -->
  <!-- top-left corner bracket -->
  <path d="M3 11 L3 3 L11 3" stroke="#2f9d8d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- top-right corner bracket -->
  <path d="M21 3 L29 3 L29 11" stroke="#2f9d8d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom-left corner bracket -->
  <path d="M3 21 L3 29 L11 29" stroke="#2f9d8d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom-right corner bracket -->
  <path d="M21 29 L29 29 L29 21" stroke="#2f9d8d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- scan line (amber) -->
  <rect x="8" y="15" width="16" height="2" rx="1" fill="#e8b04b"/>
  <!-- text hints (coral) -->
  <rect x="8" y="10" width="10" height="1.5" rx="0.75" fill="#d9594c" opacity="0.7"/>
  <rect x="8" y="20.5" width="7" height="1.5" rx="0.75" fill="#d9594c" opacity="0.5"/>
</svg>
