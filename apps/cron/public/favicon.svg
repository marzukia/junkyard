<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Cron clock mark: outer circle teal, hands teal+coral, center dot amber, 4 tick marks -->
  <circle cx="16" cy="16" r="12" stroke="#2f9d8d" stroke-width="2.2"/>
  <!-- Hour hand pointing up (teal) -->
  <line x1="16" y1="16" x2="16" y2="8" stroke="#2f9d8d" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Minute hand pointing ~:42 (coral) -->
  <line x1="16" y1="16" x2="21" y2="20" stroke="#d9594c" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Center dot (amber) -->
  <circle cx="16" cy="16" r="1.8" fill="#e8b04b"/>
  <!-- Tick marks at 12, 3, 6, 9 -->
  <line x1="16" y1="5" x2="16" y2="7.5" stroke="#2f9d8d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="16" x2="24.5" y2="16" stroke="#2f9d8d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="27" x2="16" y2="24.5" stroke="#2f9d8d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="16" x2="7.5" y2="16" stroke="#2f9d8d" stroke-width="1.5" stroke-linecap="round"/>
</svg>
