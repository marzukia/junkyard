<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- CSV grid mark: outer frame teal, grid lines teal, header row accent teal, data accents amber+coral -->
  <!-- Outer frame -->
  <rect x="4" y="4" width="24" height="24" rx="3" stroke="#2f9d8d" stroke-width="2"/>
  <!-- Vertical dividers -->
  <line x1="13" y1="4" x2="13" y2="28" stroke="#2f9d8d" stroke-width="1.5"/>
  <line x1="22" y1="4" x2="22" y2="28" stroke="#2f9d8d" stroke-width="1.5"/>
  <!-- Horizontal dividers -->
  <line x1="4" y1="12" x2="28" y2="12" stroke="#2f9d8d" stroke-width="1.5"/>
  <line x1="4" y1="20" x2="28" y2="20" stroke="#2f9d8d" stroke-width="1.5"/>
  <!-- Header cells — teal accent -->
  <rect x="4.75" y="4.75" width="7.5" height="6.5" rx="1.5" fill="#2f9d8d" opacity="0.4"/>
  <rect x="13.75" y="4.75" width="7.5" height="6.5" rx="1.5" fill="#2f9d8d" opacity="0.4"/>
  <rect x="22.75" y="4.75" width="4.5" height="6.5" rx="1.5" fill="#2f9d8d" opacity="0.4"/>
  <!-- Data accent — amber -->
  <rect x="4.75" y="12.75" width="7.5" height="6.5" rx="1.5" fill="#e8b04b" opacity="0.45"/>
  <!-- Data accent — coral -->
  <rect x="13.75" y="20.75" width="7.5" height="6.5" rx="1.5" fill="#d9594c" opacity="0.45"/>
</svg>
