<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Left column: three teal text lines, middle one struck (removed) -->
  <line x1="3" y1="9" x2="13" y2="9" stroke="#2f9d8d" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="3" y1="14" x2="13" y2="14" stroke="#2f9d8d" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="3" y1="19" x2="10" y2="19" stroke="#2f9d8d" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Coral minus accent — marks removed line -->
  <line x1="3" y1="25.5" x2="8" y2="25.5" stroke="#d9594c" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Thin coral centre divider -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#d9594c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right column: three text lines (amber accent on added line) -->
  <line x1="19" y1="9" x2="29" y2="9" stroke="#2f9d8d" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="19" y1="14" x2="26" y2="14" stroke="#2f9d8d" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="19" y1="19" x2="29" y2="19" stroke="#2f9d8d" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Amber plus accent — marks added line -->
  <line x1="21.5" y1="25.5" x2="26.5" y2="25.5" stroke="#e8b04b" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="24" y1="23" x2="24" y2="28" stroke="#e8b04b" stroke-width="2.4" stroke-linecap="round"/>
</svg>
