<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Eraser block (rectangular, slight angle) -->
  <rect x="6" y="13" width="16" height="9" rx="1.5" transform="rotate(-8 14 17.5)" stroke="#2f9d8d" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Dividing line across the eraser (used vs. clean face) -->
  <line x1="11.5" y1="12.2" x2="9.5" y2="21.8" stroke="#e8b04b" stroke-width="2" stroke-linecap="round"/>
  <!-- Swept-away crumbs / motion ticks -->
  <line x1="20" y1="24" x2="24" y2="26" stroke="#d9594c" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="22" y1="21.5" x2="26" y2="22.5" stroke="#d9594c" stroke-width="1.4" stroke-linecap="round"/>
</svg>
