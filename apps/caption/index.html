    <!-- ── Structured data ──────────────────────────────────────────── -->

      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "@id": "https://mrzk.io/#person",
            "name": "Andryo Marzuki",
            "url": "https://mrzk.io",

              "https://github.com/marzukia",
              "https://www.linkedin.com/in/andryomarzuki/"
            ]
          },
          {
            "@type": "WebApplication",
            "name": "Image Captioner",
            "url": "https://junkyard.sh/caption/",
            "description": "Generate image captions and alt text instantly in your browser, free, private, no upload. AI-powered image captioning with no signup and no data leaving your device.",
            "applicationCategory": "UtilitiesApplication",
            "operatingSystem": "Any",
            "offers": {
              "@type": "Offer",

            },

              "AI image captioning in browser",

              "Google Vision API alternative"
            ],

          }
        ]
      }
    </script>

    <!-- ── No-flash dark-mode script ────────────────────────────────── -->
    <script>
      try {
        var _cs = window.localStorage.getItem("mantine-color-scheme-value");
        var cs = _cs === "light" || _cs === "dark" || _cs === "auto" ? _cs : "auto";
        var computed =
          cs !== "auto"
            ? cs
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-mantine-color-scheme", computed);
      } catch (e) {}
    </script>

  </head>
  <body>
    <div id="root"></div>

  </body>
