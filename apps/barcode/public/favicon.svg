<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Barcode glyph: vertical bars of varying widths, teal primary, amber/coral accents -->
  <!-- Quiet zone guides (amber, thin) -->
  <line x1="2" y1="5" x2="2" y2="27" stroke="#e8b04b" stroke-width="1" stroke-linecap="round"/>
  <line x1="30" y1="5" x2="30" y2="27" stroke="#e8b04b" stroke-width="1" stroke-linecap="round"/>
  <!-- Main barcode bars (teal) -->
  <line x1="4.5" y1="5" x2="4.5" y2="27" stroke="#2f9d8d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="5" x2="7" y2="27" stroke="#2f9d8d" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="10" y1="5" x2="10" y2="27" stroke="#2f9d8d" stroke-width="1" stroke-linecap="round"/>
  <line x1="12" y1="5" x2="12" y2="27" stroke="#2f9d8d" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center guard bar (coral accent, slightly taller) -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#d9594c" stroke-width="2" stroke-linecap="round"/>
  <!-- Right bars (teal) -->
  <line x1="19.5" y1="5" x2="19.5" y2="27" stroke="#2f9d8d" stroke-width="1" stroke-linecap="round"/>
  <line x1="21.5" y1="5" x2="21.5" y2="27" stroke="#2f9d8d" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24.5" y1="5" x2="24.5" y2="27" stroke="#2f9d8d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="5" x2="27" y2="27" stroke="#2f9d8d" stroke-width="1" stroke-linecap="round"/>
</svg>
