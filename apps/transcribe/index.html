    <!-- ── Open Graph ───────────────────────────────────────────────── -->

    <!-- ── Structured data ──────────────────────────────────────────── -->

      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "@id": "https://mrzk.io/#person",
            "name": "Andryo Marzuki",
            "url": "https://mrzk.io",
            "sameAs": [
              "https://github.com/marzukia",
              "https://www.linkedin.com/in/andryomarzuki/"
            ]
          },
          {
            "@type": "WebApplication",
            "name": "Audio Transcription",
            "url": "https://junkyard.sh/transcribe/",
            "description": "Transcribe audio and video to text instantly in your browser. Free Otter.ai alternative powered by Whisper AI. No upload, no signup, no data leaves your device.",
            "applicationCategory": "UtilitiesApplication",
            "operatingSystem": "Any",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            },

              "Whisper AI speech-to-text in browser",
              "No upload, fully client-side",

              "Private, files never leave your device"
            ],

          }
        ]
      }
    </script>

    <!-- ── No-flash dark-mode script ────────────────────────────────── -->
    <script>
      try {
        var _cs = window.localStorage.getItem("mantine-color-scheme-value");
        var cs = _cs === "light" || _cs === "dark" || _cs === "auto" ? _cs : "auto";
        var computed =
          cs !== "auto"
            ? cs
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-mantine-color-scheme", computed);
      } catch (e) {}
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
