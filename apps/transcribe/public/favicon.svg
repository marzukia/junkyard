<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Waveform bars (teal, varying heights) -->
  <line x1="4" y1="20" x2="4" y2="12" stroke="#2f9d8d" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="8" y1="22" x2="8" y2="8" stroke="#2f9d8d" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="12" y1="24" x2="12" y2="6" stroke="#2f9d8d" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="16" y1="21" x2="16" y2="10" stroke="#2f9d8d" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="20" y1="19" x2="20" y2="13" stroke="#2f9d8d" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Text lines suggesting transcript output (amber) -->
  <line x1="24" y1="10" x2="29" y2="10" stroke="#e8b04b" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="24" y1="14" x2="29" y2="14" stroke="#e8b04b" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="24" y1="18" x2="27" y2="18" stroke="#e8b04b" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Coral accent dot — the transcription cursor -->
  <circle cx="24" cy="24" r="2.2" fill="#d9594c"/>
</svg>
