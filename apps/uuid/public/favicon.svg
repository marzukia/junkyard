<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- UUID document icon: outer frame + three horizontal segment lines -->
  <!-- Outer document frame: teal stroke -->
  <rect x="4" y="3" width="24" height="26" rx="3" stroke="#2f9d8d" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Top segment line: amber -->
  <line x1="8" y1="11" x2="24" y2="11" stroke="#e8b04b" stroke-width="2" stroke-linecap="round"/>
  <!-- Middle segment line: teal -->
  <line x1="8" y1="16" x2="24" y2="16" stroke="#2f9d8d" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom segment line (shorter): coral -->
  <line x1="8" y1="21" x2="18" y2="21" stroke="#d9594c" stroke-width="2" stroke-linecap="round"/>
</svg>
