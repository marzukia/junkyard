<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Photo frame outline (teal) -->
  <rect x="3" y="5" width="22" height="22" rx="2.5" stroke="#2f9d8d" stroke-width="2.4" stroke-linejoin="round"/>
  <!-- Dashed inset suggesting removed/transparent background -->
  <rect x="7" y="9" width="14" height="14" rx="1.5" stroke="#2f9d8d" stroke-width="1.6" stroke-dasharray="3 2.5"/>
  <!-- Amber accent dot — subject retained -->
  <circle cx="14" cy="16" r="2" fill="#e8b04b"/>
  <!-- Coral cut line crossing the corner — the "removal" gesture -->
  <line x1="21" y1="3" x2="29" y2="11" stroke="#d9594c" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Small coral tick to anchor the cut -->
  <circle cx="29" cy="11" r="1.8" fill="#d9594c"/>
</svg>
