<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Theme colour (light + dark) ──────────────────────────────── -->
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#13171a" media="(prefers-color-scheme: dark)" />

    <!-- ── Open Graph ───────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AI Translator" />

      property="og:description"

    />

    <meta property="og:image:height" content="630" />

      property="og:image:alt"
      content="AI Translator, free in-browser translation, no upload required"
    />

    <!-- ── Twitter card ─────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Translator, Free DeepL Alternative, No Upload, Fully Private" />
    <meta
      name="twitter:description"
      content="Translate text in your browser. Free, private, no upload, no signup. AI-powered, 200+ languages."
    />
    <meta name="twitter:image" content="https://junkyard.sh/translate/og.png" />

    <!-- ── Structured data ──────────────────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "@id": "https://mrzk.io/#person",
            "name": "Andryo Marzuki",
            "url": "https://mrzk.io",
            "sameAs": [
              "https://github.com/marzukia",
              "https://www.linkedin.com/in/andryomarzuki/"
            ]
          },
          {
            "@type": "WebApplication",
            "name": "AI Translator",
            "url": "https://junkyard.sh/translate/",
            "description": "Translate text between 200+ languages instantly in your browser. Free, private, no upload. AI-powered neural machine translation with no signup required.",
            "applicationCategory": "UtilitiesApplication",
            "operatingSystem": "Any",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            },
            "featureList": [
              "Neural machine translation in browser",
              "200+ language pairs",
              "No upload, fully client-side",
              "No signup required",
              "No API key needed",
              "Works offline after first load",
              "Private, text never leaves your device",
              "DeepL alternative",
              "Google Translate alternative"
            ],
            "author": { "@id": "https://mrzk.io/#person" }
          }
        ]
      }
    </script>

    <!-- ── No-flash dark-mode script ────────────────────────────────── -->
    <script>
      try {
        var _cs = window.localStorage.getItem("mantine-color-scheme-value");
        var cs = _cs === "light" || _cs === "dark" || _cs === "auto" ? _cs : "auto";
        var computed =
          cs !== "auto"
            ? cs
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-mantine-color-scheme", computed);
      } catch (e) {}
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
