  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary meta ─────────────────────────────────────────────── -->

    <!-- ── Open Graph ───────────────────────────────────────────────── -->

    <!-- ── Twitter card ─────────────────────────────────────────────── -->

      name="twitter:description"
      content="Free online PDF toolkit. Merge PDFs, split, compress, convert images to PDF and PDF to images, all in your browser. No upload, no signup, 100% private."
    />

    <!-- ── Structured data ──────────────────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "@id": "https://mrzk.io/#person",
            "name": "Andryo Marzuki",
            "url": "https://mrzk.io",
            "sameAs": [
              "https://github.com/marzukia",
              "https://www.linkedin.com/in/andryomarzuki/"
            ]
          },
          {
            "@type": "WebApplication",
            "name": "PDF Toolkit",
            "url": "https://junkyard.sh/pdf/",
            "description": "Free online PDF toolkit. Merge multiple PDFs, split or extract pages, reorder, compress, convert images to PDF, and export PDF pages as images. No upload required, runs entirely in your browser.",
            "applicationCategory": "UtilitiesApplication",
            "operatingSystem": "Any",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            },
            "featureList": [
              "Merge multiple PDFs",
              "Split PDF into pages",
              "Extract specific pages",
              "Reorder PDF pages",
              "Compress PDF",
              "Convert images to PDF",
              "Export PDF pages as images",
              "Drag and drop interface",
              "No upload required",
              "100% browser-based"
            ],
            "author": { "@id": "https://mrzk.io/#person" }
          }
        ]
      }
    </script>

    <!-- ── No-flash dark-mode script ────────────────────────────────── -->
    <script>
      try {
        var _cs = window.localStorage.getItem("mantine-color-scheme-value");
        var cs = _cs === "light" || _cs === "dark" || _cs === "auto" ? _cs : "auto";
        var computed =
          cs !== "auto"
            ? cs
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-mantine-color-scheme", computed);
      } catch (e) {}
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
