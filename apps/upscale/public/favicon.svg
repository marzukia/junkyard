<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer frame: teal square outline representing the upscaled image -->
  <rect x="2" y="2" width="28" height="28" rx="3" stroke="#2f9d8d" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Inner smaller frame: original image size, coral -->
  <rect x="9" y="9" width="14" height="14" rx="2" stroke="#d9594c" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Four corner outward arrows: upscale gesture, amber -->
  <!-- Top-left corner arrow -->
  <polyline points="6,10 6,6 10,6" stroke="#e8b04b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top-right corner arrow -->
  <polyline points="22,6 26,6 26,10" stroke="#e8b04b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-left corner arrow -->
  <polyline points="10,26 6,26 6,22" stroke="#e8b04b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-right corner arrow -->
  <polyline points="26,22 26,26 22,26" stroke="#e8b04b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
