name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Biome lint + format check
        run: npx biome ci src/

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
