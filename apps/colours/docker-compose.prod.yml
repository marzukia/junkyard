services:
  app:
    build: .
    container_name: colours-prod
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.colours-prod.rule=Host(`colours.junkyard.sh`)"
      - "traefik.http.routers.colours-prod.entrypoints=websecure"
      - "traefik.http.routers.colours-prod.tls.certresolver=cloudflare"
      - "traefik.http.services.colours-prod.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
