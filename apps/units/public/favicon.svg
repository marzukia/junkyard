<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Ruler body — teal stroke outline, no fill -->
  <rect x="2" y="12.5" width="28" height="7" rx="1.5" stroke="#2f9d8d" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Tick marks on ruler — teal strokes -->
  <line x1="8" y1="12.5" x2="8" y2="10" stroke="#2f9d8d" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="12.5" x2="13" y2="11" stroke="#2f9d8d" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="12.5" x2="18" y2="10" stroke="#2f9d8d" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="12.5" x2="23" y2="11" stroke="#2f9d8d" stroke-width="2" stroke-linecap="round"/>
  <!-- Up arrowhead — amber -->
  <path d="M26 9.5 L28.2 13 L23.8 13Z" fill="#e8b04b"/>
  <!-- Down arrowhead — coral -->
  <path d="M26 22.5 L23.8 19 L28.2 19Z" fill="#d9594c"/>
  <!-- Vertical shaft connecting arrowheads — amber stroke -->
  <line x1="26" y1="13" x2="26" y2="19" stroke="#e8b04b" stroke-width="2" stroke-linecap="round"/>
</svg>
