<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Clock face: teal outer ring, amber minute hand, coral center -->
  <circle cx="16" cy="16" r="12" stroke="#2f9d8d" stroke-width="2.5"/>
  <!-- Hour hand (up, teal) -->
  <line x1="16" y1="16" x2="16" y2="8" stroke="#2f9d8d" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand (right, amber) -->
  <line x1="16" y1="16" x2="22" y2="16" stroke="#e8b04b" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot (coral) -->
  <circle cx="16" cy="16" r="1.5" fill="#d9594c"/>
  <!-- 12 o-clock tick (teal) -->
  <line x1="16" y1="5" x2="16" y2="7" stroke="#2f9d8d" stroke-width="2" stroke-linecap="round"/>
</svg>
