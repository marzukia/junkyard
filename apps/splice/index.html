    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Theme colour -->
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#13171a" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "@id": "https://mrzk.io/#person",
            "name": "Andryo Marzuki",
            "url": "https://mrzk.io",
            "sameAs": [
              "https://github.com/marzukia",
              "https://www.linkedin.com/in/andryomarzuki/"
            ]
          },
          {
            "@type": "WebApplication",
            "name": "Video Splicer",
            "url": "https://junkyard.sh/splice/",
            "description": "Free in-browser video splicer: combine multiple videos into one. Powered by ffmpeg.wasm - no upload, no signup, no watermark.",
            "applicationCategory": "MultimediaApplication",
            "operatingSystem": "Any",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            },
            "featureList": [
              "Combine multiple video clips into one",
              "Drag and drop to reorder clips",
              "Runs entirely in browser, no upload"
            ],
            "author": { "@id": "https://mrzk.io/#person" }
          }
        ]
      }
    </script>

    <!-- No-flash dark-mode script -->
    <script>
      try {
        var _cs = window.localStorage.getItem("mantine-color-scheme-value");
        var cs = _cs === "light" || _cs === "dark" || _cs === "auto" ? _cs : "auto";
        var computed =
          cs !== "auto"
            ? cs
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-mantine-color-scheme", computed);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
