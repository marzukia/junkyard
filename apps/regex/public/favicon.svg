<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Regex glyph: forward-slash teal, dot amber, asterisk coral -->
  <!-- Forward slash — teal -->
  <line x1="20" y1="4" x2="12" y2="28" stroke="#2f9d8d" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Dot — amber (period / literal match) -->
  <circle cx="8" cy="22" r="2.2" fill="#e8b04b"/>
  <!-- Asterisk — coral (quantifier) -->
  <line x1="25" y1="11" x2="25" y2="19" stroke="#d9594c" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="21.5" y1="12.5" x2="28.5" y2="17.5" stroke="#d9594c" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="28.5" y1="12.5" x2="21.5" y2="17.5" stroke="#d9594c" stroke-width="2.2" stroke-linecap="round"/>
</svg>
